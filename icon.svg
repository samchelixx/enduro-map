<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Terrain lines -->
  <path d="M60 380 Q150 320 200 350 Q260 380 320 330 Q380 280 452 340" stroke="rgba(255,255,255,0.08)" stroke-width="6" fill="none"/>
  <path d="M60 410 Q160 360 220 380 Q290 400 360 360 Q410 340 452 370" stroke="rgba(255,255,255,0.05)" stroke-width="5" fill="none"/>
  <!-- Route line -->
  <path d="M120 340 Q180 180 256 200 Q340 220 380 160" stroke="url(#accent)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="none" opacity="0.9"/>
  <!-- Route dots -->
  <circle cx="120" cy="340" r="10" fill="#f97316" stroke="#fff" stroke-width="3"/>
  <circle cx="200" cy="210" r="8" fill="#f97316" stroke="#fff" stroke-width="3"/>
  <circle cx="300" cy="210" r="8" fill="#f97316" stroke="#fff" stroke-width="3"/>
  <circle cx="380" cy="160" r="10" fill="#f97316" stroke="#fff" stroke-width="3"/>
  <!-- Pin marker -->
  <g transform="translate(256, 140)">
    <path d="M0-60 C-33-60 -50-33 -50 0 C-50 30 0 70 0 70 C0 70 50 30 50 0 C50-33 33-60 0-60Z" fill="url(#accent)" opacity="0.9"/>
    <circle cx="0" cy="-5" r="16" fill="#fff" opacity="0.9"/>
  </g>
  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="52" letter-spacing="6" fill="url(#accent)">ENDURO</text>
</svg>
